output:
  - summary
  - success
  - failure
  - execution

post-checkout:
  commands:
    build:
      run: go build -o ./printing-press ./cmd/printing-press 2>/dev/null && echo "printing-press binary rebuilt" || true

post-merge:
  commands:
    build:
      run: go build -o ./printing-press ./cmd/printing-press 2>/dev/null && echo "printing-press binary rebuilt" || true

pre-commit:
  commands:
    fmt:
      glob: "*.go"
      run: gofmt -w {staged_files} && git add {staged_files}
      stage_fixed: true

pre-push:
  commands:
    fmt:
      glob: "*.go"
      run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      fail_text: "gofmt failed. Run 'gofmt -w .' to fix."
    lint:
      glob: "*.go"
      run: golangci-lint run ./...
      fail_text: "golangci-lint failed. Fix lint errors before pushing."
